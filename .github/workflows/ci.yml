name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # A matrix, not just windows-latest: this is the only real verification that the
    # cross-platform fixes (system-Python discovery, portable SQLite, non-DPAPI secret store)
    # actually work on Linux/macOS, since local development happens on Windows only.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      # Smoke the CLI entrypoints on every OS so Windows-only regressions are caught early.
      - name: Smoke help
        run: dotnet run --project Axiom.Cli --no-build -c Release -- help

      - name: Smoke code usage (no network)
        run: dotnet run --project Axiom.Cli --no-build -c Release -- code
        continue-on-error: true
